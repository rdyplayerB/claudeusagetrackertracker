name: Discover New Trackers

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Search for new trackers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Search GitHub for Claude usage trackers
          gh search repos "claude usage tracker" --limit 50 --json name,url,description,stargazersCount > /tmp/search1.json
          gh search repos "claude code tracker" --limit 50 --json name,url,description,stargazersCount > /tmp/search2.json
          gh search repos "claude token tracker" --limit 30 --json name,url,description,stargazersCount > /tmp/search3.json

          # Combine and dedupe
          jq -s 'add | unique_by(.url)' /tmp/search1.json /tmp/search2.json /tmp/search3.json > /tmp/all_results.json

          # Get existing repos
          jq -r '.trackers[].url' trackers.json > /tmp/existing.txt

          # Get excluded repos
          jq -r '.[] | "https://github.com/\(.)"' excluded.json > /tmp/excluded.txt 2>/dev/null || touch /tmp/excluded.txt

          # Find new repos (minimum 2 stars, not in existing or excluded)
          jq -r --slurpfile existing <(jq -R . /tmp/existing.txt | jq -s .) \
                --slurpfile excluded <(jq -R . /tmp/excluded.txt | jq -s .) \
            '[.[] | select(.stargazersCount >= 2) | select(.url as $u | $existing[0] | index($u) | not) | select(.url as $u | $excluded[0] | index($u) | not)]' \
            /tmp/all_results.json > /tmp/new_trackers.json

          # Check if we found anything new
          NEW_COUNT=$(jq length /tmp/new_trackers.json)
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT

          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "Found $NEW_COUNT new tracker(s)!"
            cat /tmp/new_trackers.json
          else
            echo "No new trackers found."
          fi
        id: search

      - name: Update star counts for existing trackers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Update star counts from search results
          jq --slurpfile results /tmp/all_results.json '
            .trackers |= map(
              . as $t |
              ($results[0][] | select(.url == $t.url) | .stargazersCount) as $newStars |
              if $newStars then .stars = $newStars else . end
            ) |
            .trackers |= sort_by(-.stars)
          ' trackers.json > /tmp/updated_stars.json
          mv /tmp/updated_stars.json trackers.json

      - name: Update trackers.json with new discoveries
        if: steps.search.outputs.new_count > 0
        run: |
          TODAY=$(date +%Y-%m-%d)

          # Add new trackers to the JSON
          jq --slurpfile new /tmp/new_trackers.json --arg today "$TODAY" '
            .trackers += [$new[0][] | {
              name: .name,
              repo: (.url | sub("https://github.com/"; "")),
              url: .url,
              description: (.description // ""),
              stars: .stargazersCount,
              type: "unknown",
              discovered: $today
            }] |
            .trackers |= sort_by(-.stars) |
            .meta.last_updated = $today |
            .meta.total_count = (.trackers | length)
          ' trackers.json > /tmp/updated.json
          mv /tmp/updated.json trackers.json

      - name: Update history.json
        run: |
          TODAY=$(date +%Y-%m-%d)

          # Calculate totals
          TOTAL_COUNT=$(jq '.trackers | length' trackers.json)
          TOTAL_STARS=$(jq '[.trackers[].stars] | add' trackers.json)

          # Get new trackers discovered today
          NEW_TODAY=$(jq --arg today "$TODAY" '[.trackers[] | select(.discovered == $today)] | length' trackers.json)

          # Initialize history.json if it doesn't exist
          if [ ! -f history.json ]; then
            echo '{"entries":[]}' > history.json
          fi

          # Add today's entry (or update if already exists)
          jq --arg date "$TODAY" \
             --argjson count "$TOTAL_COUNT" \
             --argjson stars "$TOTAL_STARS" \
             --argjson new "$NEW_TODAY" '
            .entries |= (
              map(select(.date != $date)) + [{
                date: $date,
                count: $count,
                stars: $stars,
                new: $new
              }]
            ) |
            .entries |= sort_by(.date)
          ' history.json > /tmp/history_updated.json
          mv /tmp/history_updated.json history.json

      - name: Update metadata
        run: |
          TODAY=$(date +%Y-%m-%d)
          TOTAL_COUNT=$(jq '.trackers | length' trackers.json)
          TOTAL_STARS=$(jq '[.trackers[].stars] | add' trackers.json)

          jq --arg today "$TODAY" \
             --argjson count "$TOTAL_COUNT" \
             --argjson stars "$TOTAL_STARS" '
            .meta.last_updated = $today |
            .meta.total_count = $count |
            .meta.total_stars = $stars
          ' trackers.json > /tmp/meta_updated.json
          mv /tmp/meta_updated.json trackers.json

      - name: Regenerate README
        run: |
          ./scripts/generate-readme.sh

      - name: Commit daily updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trackers.json history.json README.md
          git diff --staged --quiet || git commit -m "Daily stats update"
          git push

      - name: Create Pull Request for new discoveries
        if: steps.search.outputs.new_count > 0
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add newly discovered trackers"
          title: "New tracker(s) discovered"
          body: |
            The daily scan found new Claude usage tracker(s).

            Review and merge to track them.

            ---
            *Automated by Claude Tracker Tracker*
          branch: auto-discover
          delete-branch: true
